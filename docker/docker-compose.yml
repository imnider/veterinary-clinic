services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: database

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin1234@"
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    volumes:
      - veterinary_clinic:/var/opt/mssql

volumes:
  veterinary_clinic:
    external: true
