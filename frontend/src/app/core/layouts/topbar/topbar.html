<header
  class="w-full bg-base-100/80 backdrop-blur-sm px-5 pt-6 pb-3 flex items-center justify-between"
>
  <div>
    <p class="text-sm text-base-content/60">Bienvenido de nuevo</p>
    <h1 class="text-xl font-semibold text-primary">{{ username() }}</h1>
  </div>

  <button
    type="button"
    class="btn btn-ghost btn-circle"
    (click)="onLogout()"
    aria-label="Cerrar sesión"
  >
    <ng-icon name="heroArrowRightStartOnRectangle" color="red" class="text-xl" />
  </button>
</header>
