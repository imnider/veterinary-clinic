<section class="px-5 pt-2 flex flex-col gap-5">
  <label class="input input-bordered rounded-full flex items-center gap-2 bg-base-100 max-w-md">
    <ng-icon name="heroMagnifyingGlass" class="text-base-content/40" />
    <input type="search" class="grow" placeholder="Buscar" />
  </label>

  <!-- carrusel -->
  <div class="relative w-full h-80 rounded-3xl overflow-hidden">
    <div
      #carousel
      class="flex w-full h-full overflow-x-auto snap-x snap-mandatory scroll-smooth no-scrollbar"
    >
      @for (banner of banners; track banner) {
        <div class="min-w-full h-full snap-center">
          <img [src]="banner" class="w-full h-full object-cover" alt="Banner" />
        </div>
      }
    </div>
    <button
      type="button"
      class="btn btn-circle btn-sm absolute left-3 top-1/2 -translate-y-1/2"
      (click)="previousBanner()"
    >
      ❮
    </button>
    <button
      type="button"
      class="btn btn-circle btn-sm absolute right-3 top-1/2 -translate-y-1/2"
      (click)="nextBanner()"
    >
      ❯
    </button>
  </div>

  <!-- body -->
  <div class="flex flex-col gap-3">
    <h2 class="font-semibold text-base-content/80">Citas próximas</h2>
    @for (appointment of upcomingAppointments(); track appointment.appointmentDate) {
      <app-appointment-card [appointment]="appointment" />
    } @empty {
      <p class="text-sm text-base-content/50">No tienes citas próximas.</p>
    }
  </div>
</section>
