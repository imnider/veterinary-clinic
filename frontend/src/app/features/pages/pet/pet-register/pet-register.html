<section class="px-5 pt-6 pb-10 flex flex-col gap-6 max-w-md mx-auto">
  <h1 class="text-xl font-semibold text-base-content">Registrar mascota</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col items-center gap-2">
      <div class="avatar">
        <div
          class="w-28 h-28 rounded-full ring ring-base-300 ring-offset-2 overflow-hidden bg-base-200"
        >
          @if (photoPreview()) {
            <img
              [src]="photoPreview()"
              alt="Foto de la mascota"
              class="object-cover w-full h-full"
            />
          } @else {
            <div class="w-full h-full flex items-center justify-center text-base-content/40">
              <ng-icon name="heroPhoto" class="text-3xl" />
            </div>
          }
        </div>
      </div>
      <label class="btn btn-sm btn-outline rounded-full">
        Elegir foto
        <input type="file" accept="image/*" class="hidden" (change)="onPhotoSelected($event)" />
      </label>
    </div>

    @if (isStaff()) {
      <label class="form-control">
        <span class="label-text text-base-content/70 mb-1">ID del dueño</span>
        <input
          formControlName="ownerId"
          type="number"
          placeholder="ID del cliente dueño de la mascota"
          class="input input-bordered rounded-full w-full"
        />
        @if (form.controls.ownerId.invalid && form.controls.ownerId.touched) {
          <span class="text-error text-xs mt-1 ml-3">Indica el ID del dueño.</span>
        }
      </label>
    }

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Nombre</span>
      <input
        formControlName="name"
        type="text"
        placeholder="Nombre de la mascota"
        class="input input-bordered rounded-full w-full"
      />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <span class="text-error text-xs mt-1 ml-3">El nombre es obligatorio.</span>
      }
    </label>

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Especie</span>
      <select formControlName="species" class="select select-bordered rounded-full w-full">
        <option value="" disabled selected>Selecciona una especie</option>
        @for (opt of species; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      @if (form.controls.species.invalid && form.controls.species.touched) {
        <span class="text-error text-xs mt-1 ml-3">Selecciona una especie.</span>
      }
    </label>

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Raza</span>
      <input
        formControlName="breed"
        type="text"
        placeholder="Raza"
        class="input input-bordered rounded-full w-full"
      />
    </label>

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Sexo</span>
      <select formControlName="sex" class="select select-bordered rounded-full w-full">
        <option value="" disabled selected>Selecciona el sexo</option>
        @for (opt of sexes; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      @if (form.controls.sex.invalid && form.controls.sex.touched) {
        <span class="text-error text-xs mt-1 ml-3">Selecciona el sexo.</span>
      }
    </label>

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Fecha de nacimiento</span>
      <input
        formControlName="birthDate"
        type="date"
        class="input input-bordered rounded-full w-full"
      />
      @if (form.controls.birthDate.invalid && form.controls.birthDate.touched) {
        <span class="text-error text-xs mt-1 ml-3">La fecha de nacimiento es obligatoria.</span>
      }
    </label>

    <label class="form-control">
      <span class="label-text text-base-content/70 mb-1">Peso (kg)</span>
      <input
        formControlName="weight"
        type="number"
        min="0"
        step="0.1"
        placeholder="0.0"
        class="input input-bordered rounded-full w-full"
      />
      @if (form.controls.weight.invalid && form.controls.weight.touched) {
        <span class="text-error text-xs mt-1 ml-3">Indica un peso válido.</span>
      }
    </label>

    <label class="flex items-center gap-3 px-1">
      <input
        formControlName="neutered"
        type="checkbox"
        class="checkbox checkbox-primary rounded-full"
      />
      <span class="label-text text-base-content/70">Esterilizado</span>
    </label>

    @if (errorMessage()) {
      <div class="alert alert-error rounded-2xl text-sm">{{ errorMessage() }}</div>
    }

    <button type="submit" class="btn btn-primary rounded-full mt-2" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <span class="loading loading-spinner loading-sm"></span>
      }
      Registrar mascota
    </button>
  </form>
</section>
